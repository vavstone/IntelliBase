services:
  phoenix:
    image: arizephoenix/phoenix:17.6.0
    ports:
      - "6006:6006" # UI
      - "4317:4317" # OLTP
    environment:
      PHOENIX_WORKING_DIR: /data
    volumes:
      - phoenix_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: llm-service:dev
    container_name: llm-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:4317
    depends_on:
      redis:
        condition: service_healthy
      phoenix:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/ready', timeout=3).status == 200 else sys.exit(1)"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7.4-alpine
    container_name: llm-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
  phoenix_data: